data_trust:
  sources:
    understat:
      base_trust: 0.90
      stale_threshold_hours: 48
      stale_trust_cap: 0.50
      outlier_xg_threshold: 5.0
      outlier_trust_cap: 0.60
      suspect_zero_consecutive_threshold: 3
      suspect_zero_trust_cap: 0.30
    api_football:
      base_trust: 0.80
      confirmed_trust: 0.95
      predicted_early_trust_cap: 0.40
      predicted_early_minutes_threshold: 180
      incomplete_lineup_player_threshold: 9
      incomplete_lineup_trust: 0.20
    pinnacle:
      base_trust: 0.90
      invalid_odds_min: 1.01
      invalid_odds_max: 50.0
      wide_spread_threshold: 0.05
      wide_spread_trust_cap: 0.70
      stale_near_kickoff_minutes_data: 60
      stale_near_kickoff_minutes_match: 60
      stale_near_kickoff_trust_cap: 0.50
    perplexity:
      base_trust: 0.60
      confirmed_trust: 0.90
      contradicts_trust: 0.20
  stake_action_thresholds:
    skip_below: 0.50
    reduce_below: 0.65
    reduce_stake_pct: 0.30

season_phase:
  early_threshold: 0.28
  late_threshold: 0.75
  phases:
    EARLY:
      xg_weight: 0.60
      form_weight: 0.20
      pi_rating_weight: 0.80
      odds_movement_weight: 1.20
      min_matches_for_rolling: 3
      edge_min_boost: 0.01
    MID:
      xg_weight: 1.0
      form_weight: 1.0
      pi_rating_weight: 1.0
      odds_movement_weight: 1.0
      min_matches_for_rolling: 5
      edge_min_boost: 0.0
    LATE:
      xg_weight: 0.80
      form_weight: 0.70
      pi_rating_weight: 0.90
      motivation_weight: 1.50
      odds_movement_weight: 1.10
      edge_min_boost: 0.015
      dead_rubber_auto_skip: true
    INTERNATIONAL_BREAK:
      stake_multiplier: 0.50
      edge_min_boost: 0.02

self_learning:
  min_errors_for_auto_correction: 3
  max_auto_weight_change: 0.10
  max_auto_threshold_change: 0.01
  correction_review_required_above: 0.15
  patterns:
    derby_overconfidence:
      confidence_threshold: 0.75
      match_types: ["DERBY_NATIONAL", "DERBY_LOCAL", "DERBY"]
    late_season_rotation:
      min_matchday_pct: 0.80
      min_consecutive_errors: 2

temporal_validator:
  auto_correct_threshold_pct: 5.0
  block_threshold_pct: 5.0
  rolling_keywords: ["rolling", "last", "form", "avg", "mean", "sum", "std"]
  leaky_columns: ["closing_odds"]

explainer:
  top_n_features: 5

live_events:
  minutes_before_kickoff_threshold: 120
  impacts:
    GOAL:
      home_delta: 0.08
      confidence_adjustment: 0.0
      stake_action: keep
    RED_CARD:
      home_delta: 0.12
      confidence_adjustment: -0.05
      stake_action: reduce
    INJURY_KEY:
      home_delta: -0.06
      confidence_adjustment: -0.06
      stake_action: reduce
    INJURY_NORMAL:
      home_delta: -0.02
      confidence_adjustment: -0.02
      stake_action: keep

player_impact:
  doubtful_availability: 0.50
  importance_threshold_key_player: 0.70
